name: Continuous Deployment to OCI Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Execute Remote SSH Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            # 1. Force path structure stability
            mkdir -p ~/impression-track
            cd ~/impression-track

            # 2. Re-initialize Git safely without empty-directory errors
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            # 3. Clean tracking sync
            git fetch --all
            git reset --hard origin/main

            # 4. Use sudo wrapper to explicitly bypass any cached system socket locks
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build