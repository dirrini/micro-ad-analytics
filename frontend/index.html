<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campaign Live Dashboard</title>
    <style>
      body { font-family: sans-serif; background-color: #f1f5f9; margin: 0; padding: 2rem; }
      .container { max-width: 1200px; margin: 0 auto; }
      header { margin-bottom: 2.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 1.5rem; }
      h1 { margin: 0; font-size: 2rem; color: #0f172a; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 2rem; }
      .card { background: #fff; border-radius: 1rem; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
      h2 { margin: 0 0 2rem 0; font-size: 1.25rem; color: #1e293b; }
      .chart-container { position: relative; height: 320px; width: 100%; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
